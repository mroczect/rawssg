name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'src/**'          # also rebuild if the generator itself changes
      - 'templates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:      # allow manual runs from the Actions tab

# Grant the workflow permission to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build rawssg (release)
        run: cargo build --release

      - name: Prepare docs configuration
        working-directory: docs
        run: |
          # Set production base URL so RSS/sitemap links are correct.
          sed -i 's|base_url:.*|base_url: "https://mroczect.github.io/rawssg/"|' config.yaml
          cat config.yaml   # print for debugging

      - name: Compile documentation site
        working-directory: docs
        run: ../target/release/rawssg compile

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
