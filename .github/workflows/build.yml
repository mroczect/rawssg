name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  # ------------------------------------------------------------------
  # Build & Test Matrix (Linux + macOS)
  # ------------------------------------------------------------------
  build:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      BINARY_NAME: rawssg
      ARTIFACT_NAME: rawssg-${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Smoke test the binary
        run: |
          output=$("./target/release/$BINARY_NAME" info)
          if [ -z "$output" ]; then
            echo "ERROR: Failed to run rawssg info"
            exit 1
          fi
          echo "Binary output:"
          echo "$output"

      - name: Package binary for upload
        run: |
          mkdir -p upload
          cp "./target/release/$BINARY_NAME" upload/
          tar -czf "$ARTIFACT_NAME.tar.gz" -C upload "$BINARY_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz

  # ------------------------------------------------------------------
  # Release Job (only on version tags)
  # ------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display artifact structure
        run: ls -R

      - name: Collect release assets
        run: |
          find . -name "*.tar.gz" -exec mv {} . \;
          ls -lh *.tar.gz

      - name: Generate SHA256 checksums
        run: |
          rm -f SHA256SUMS
          for file in rawssg-*.tar.gz; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> SHA256SUMS
            fi
          done
          echo "Checksums:"
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          artifacts: "rawssg-*.tar.gz,SHA256SUMS"
          body: |
            ## RawSSG Release ${{ github.ref_name }}

            Pre-built static site generator binary for:
            - Linux (x86_64) → `rawssg-ubuntu-latest.tar.gz`
            - macOS → `rawssg-macos-latest.tar.gz`

            ### SHA256 Checksums
            See the `SHA256SUMS` file for integrity verification.
